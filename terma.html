<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Lucianoluxx</title>
		<link rel="stylesheet" type="text/css" href="styles/närconstyles.css">
		<link rel="stylesheet" type="text/css" href="styles/screen-effect.css">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Jersey+15&display=swap" rel="stylesheet">
	</head>

	<body onload="move();">
		<div class='screen oldscreeneffect'>
			<p style="line-height:20px">&nbsp;</p>
			<div style="text-align:center">
				<h1>Lucianoluxx</h1>
				<h2>Närcon 2024</h2>
			</div>
			<p id="inbet">&nbsp;</p>
			<div style="text-align:center">
				<div id="myProgress">
					<div id="myBar"></div>
				</div>
				<br>
				<p>(C) Lucianoluxx 2024</p>
				<p id="credit">all rights reserved</p> 
			</div>
		</div>
		
		<script type="text/javascript">
			//<![CDATA[
			var i = 0;
				function move() {
				if (i == 0) {
					i = 1;
					var elem = document.getElementById("myBar");
					var width = 1;
					function sleep (time) {
						return new Promise((resolve) => setTimeout(resolve, time));
					}
					sleep(500).then(() => {
						var id = setInterval(frame, 20);
						function frame() {
						if (width >= 100) {
							clearInterval(id);
							i = 0;
							window.location.href = "hidden/transition.html";
						} else {
							width++;
							elem.style.width = width + "%";
						}
						}
					});
				}
				}
			//]]>
		</script>
	</body>
</html>
