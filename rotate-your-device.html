<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Lucianoluxx</title>
		<link rel="stylesheet" type="text/css" href="styles/screen-effect.css">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Jersey+15&display=swap" rel="stylesheet">
		<style type="text/css">
			/*<![CDATA[*/
			h1{
				font-size: 60px;
				text-transform: uppercase;
				color: #19df80;
				text-shadow: 0 0 10px #19df80;
				margin: 0;
				padding-top:35px;
				text-align:center;
				align-content:center;
			}
			
			h2{
				font-size: 18px;
				text-transform: uppercase;
				color: #19df80;
				text-shadow: 0 0 10px #19df80;
				margin: 0;
				padding-top:10px;
				text-align:center;
				align-content:center;
				padding-right:40px;
				padding-left:40px;
			}
			
			#phone {
				margin: auto;
				animation: mymove 5s infinite;
				width:300px;
				height:300px;
				padding-top:40px;
				padding-bottom:0px;
			}

			@keyframes mymove {
				50% {transform: rotate(90deg);}
			}
			
			#credit {
				font-size: 10px;
				text-transform: uppercase;
				color: #19df80;
				text-shadow: 0 0 10px #19df80;
				margin: 0;
				padding-top:0px;
				text-align:center;
				align-content:center;
			}
			
			a:link { 
			text-decoration: none; 
			} 
			
			a:visited { 
			text-decoration: none; 
			} 
			
			a:hover { 
			text-decoration: none; 
			} 
			
			a:active { 
			text-decoration: none; 
			}
			
			p{
				font-size:20px;
				font-family: jersey15, sans-serif;
				text-transform: uppercase;
				color: #19df80;
				text-shadow: 0 0 5px #19df80;
				margin:0;
				padding-top: 10px;
				text-align:center;
				align-content:center;
			}
			
			#rights{
				font-size:15px;
			}
			/*]]>*/
		</style>
	</head>
		
	<body>
		<script>
		//<![CDATA[
			hei = window.screen.height;
			wi = window.screen.width;
			
			function sleep(ms) {
				return new Promise(resolve => setTimeout(resolve, ms));
			}
			if (hei < wi){
				window.location.replace("index.html");
			}else{
				document.write("<div class='screen oldscreeneffect'>");
				document.write("<h1>Rotate your device!</h1>");
				document.write("<h2>For the recommended experience, please rotate your device into landscape mode.</h2>");
				document.write("<div id='phone'>");
				document.write("<img src='media/motion_tracker.png' width='260' height='260' alt='A rotating motion tracker.'/>");
				document.write("</div>");
				document.write("</div>");
				sleep(5000).then(() => { window.location.replace("index.html"); });
			}
		//]]>
		</script>
	</body>
</html>
